    <section class="week-card mobile-view-section" data-mobile-section="calendar">
      <div class="week-header">
        <div>
          <h2>Current Week</h2>
          <p id="weekRange"></p>
        </div>
        <strong id="weekCount">0 deliveries</strong>
      </div>
      <div id="weekSchedule" class="week-schedule"></div>
    </section>

    <section class="panel entry-panel mobile-view-section" data-mobile-section="entry">
      <h2>New Delivery</h2>
      <form id="newDeliveryForm" class="new-delivery-form">
        <label>Delivery Date
          <input id="newDeliveryDate" type="date" />
        </label>

        <label>Delivery Time
          <input id="newDeliveryTime" type="text" inputmode="text" placeholder="8:00 AM" autocomplete="off" />
        </label>

        <label>Pick Up Time
          <input id="newPickupTime" type="text" inputmode="text" placeholder="8:00 AM" autocomplete="off" />
        </label>

        <label>Delivery Company <span class="required">Required</span>
          <input id="newDeliveryCompany" list="deliveryCompanyOptions" required />
        </label>

        <label>Delivery Driver <span class="required">Required</span>
          <input id="newDeliveryDriver" list="driverNameOptions" required />
        </label>

        <label>Driver ID Number
          <input id="newDriverIdNumber" />
        </label>

        <label>Delivery Van <span class="required">Required</span>
          <input id="newDeliveryVan" list="deliveryVanOptions" required />
        </label>

        <label>Plate #
          <input id="newLicensePlate" />
        </label>

        <label>Dispensary Name <span class="required">Required</span>
          <input id="newStore" list="dispensaryNameOptions" required />
        </label>

        <label>Dispensary Location <span class="required">Required</span>
          <input id="newDispensaryLocation" required />
        </label>

        <label class="wide-field">Dispensary Address
          <textarea id="newDispensaryAddress" rows="2" class="compact-address"></textarea>
        </label>

        <fieldset class="wide-field">
          <legend>Companies Delivering <span class="required">Required</span></legend>
          <label><input type="checkbox" name="newCompaniesDelivering" value="Hijnx" /> Hijnx</label>
          <label><input type="checkbox" name="newCompaniesDelivering" value="SB" /> SB</label>
          <label><input type="checkbox" name="newCompaniesDelivering" value="PG" /> PG</label>
        </fieldset>

        <label>Needs Displays
          <select id="newNeedsDisplay">
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </label>

        <label>Date Order Received
          <input id="newDateOrderReceived" type="date" />
        </label>

        <label>Boarder Store
          <select id="newBorderStore">
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </label>

        <button class="wide-field" type="submit">Add Delivery</button>
      </form>
      <p id="newDeliveryResult" class="message"></p>

      <form id="spreadsheetImportForm" class="spreadsheet-import-form">
        <label>Upload Spreadsheet
          <input id="spreadsheetImportFile" type="file" name="schedule" accept=".xlsx,.xls,.csv" required />
        </label>
        <button type="submit">Upload</button>
      </form>
      <p id="spreadsheetImportResult" class="message"></p>

      <div class="summary">
        <div>
          <strong id="totalCount">0</strong>
          <span>Total</span>
        </div>
        <div>
          <strong id="inProgressCount">0</strong>
          <span>In Progress</span>
        </div>
        <div>
          <strong id="completedCount">0</strong>
          <span>Completed</span>
        </div>
      </div>
    </section>

    <section class="calendar-card mobile-view-section" data-mobile-section="calendar">
      <div id="calendar"></div>
    </section>

    <section class="panel unscheduled-panel mobile-view-section" data-mobile-section="calendar list">
      <h2>Orders To Be Scheduled</h2>
      <div id="unscheduledList" class="unscheduled-list"></div>
    </section>

    <section class="panel list-panel mobile-view-section" data-mobile-section="list">
      <div class="list-header">
        <h2>Delivery List</h2>
        <select id="statusFilter">
          <option value="">All Statuses</option>
          <option>Not Started</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>
      </div>
      <div id="deliveryList" class="delivery-list"></div>
    </section>
  </main>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-content">
      <button id="closeDrawer" class="close-btn">×</button>
      <h2 id="drawerTitle">Delivery</h2>

      <form id="deliveryForm" class="delivery-form">
        <input type="hidden" id="deliveryId" />

        <label>Dispensary Name <span class="required">Required</span>
          <input id="store" list="dispensaryNameOptions" required />
        </label>

        <label>Dispensary Location <span class="required">Required</span>
          <input id="dispensaryLocation" required />
        </label>

        <label class="full-width">Dispensary Address
          <textarea id="dispensaryAddress" rows="2" class="compact-address"></textarea>
        </label>

        <fieldset class="full-width">
          <legend>Companies Delivering <span class="required">Required</span></legend>
          <label><input type="checkbox" name="companiesDelivering" value="Hijnx" /> Hijnx</label>
          <label><input type="checkbox" name="companiesDelivering" value="SB" /> SB</label>
          <label><input type="checkbox" name="companiesDelivering" value="PG" /> PG</label>
        </fieldset>

        <label>Boarder Store
          <select id="borderStore">
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </label>

        <label>Needs Displays
          <select id="needsDisplay">
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </label>

        <label>Date Order Received
          <input id="dateOrderReceived" type="date" />
        </label>

        <label>Delivery Date
          <input id="deliveryDate" type="date" />
        </label>

        <label>Delivery Time
          <input id="deliveryTime" type="text" inputmode="text" placeholder="8:00 AM" autocomplete="off" />
        </label>

        <label>Pick Up Time
          <input id="pickupTime" type="text" inputmode="text" placeholder="8:00 AM" autocomplete="off" />
        </label>

        <label>Delivery Company <span class="required">Required</span>
          <input id="deliveryCompany" list="deliveryCompanyOptions" required />
        </label>

        <label>Delivery Driver <span class="required">Required</span>
          <input id="deliveryDriver" list="driverNameOptions" required />
        </label>

        <label>Driver ID Number
          <input id="driverIdNumber" />
        </label>

        <label>Delivery Van <span class="required">Required</span>
          <input id="deliveryVan" list="deliveryVanOptions" required />
        </label>

        <label>Plate #
          <input id="licensePlate" />
        </label>

        <label>Status
          <select id="status">
            <option>Not Started</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </label>

        <label class="full-width">Notes
          <textarea id="notes" rows="3"></textarea>
        </label>

        <div class="drawer-actions full-width">
          <button type="submit">Save Delivery Details</button>
          <button id="deleteDelivery" class="danger-btn" type="button">Delete Delivery</button>
        </div>
      </form>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
